<!-- RANKING HERO -->
<section class="ranking-hero">
    <span class="badge">
        <i class="fa-solid fa-trophy"></i>
        交易排行榜
    </span>
    <h1>頂尖預測玩家</h1>
    <p>查看平台中收益最高、勝率最佳與交易最活躍的使用者排名</p>
</section>

<!-- RANKING STATS -->
<section class="ranking-stats">
    <div class="ranking-stat-card">
        <span>總參與用戶</span>
        <strong>45,231</strong>
        <p>本月新增 +12.4%</p>
    </div>
    <div class="ranking-stat-card">
        <span>最高收益</span>
        <strong>$128,430</strong>
        <p>來自政治市場</p>
    </div>
    <div class="ranking-stat-card">
        <span>最高勝率</span>
        <strong>92.8%</strong>
        <p>連續 18 場命中</p>
    </div>
    <div class="ranking-stat-card">
        <span>總交易量</span>
        <strong>$892.5M</strong>
        <p>24H +8.6%</p>
    </div>
</section>

<!-- RANKING MAIN -->
<section class="ranking-section">
    <div class="section-title">
        <h2>排行榜</h2>
    </div>
    <div class="ranking-tabs">
        <button class="active">總收益</button>
        <button>勝率</button>
        <button>交易量</button>
        <button>本週排行</button>
        <button>本月排行</button>
    </div>
    <div class="top-rank-grid">
        <div class="top-card second">
            <div class="rank-medal">2</div>
            <div class="avatar"><i class="fa-solid fa-user"></i></div>
            <h3>CryptoKing</h3>
            <p>收益 $94,280</p>
            <span class="green">勝率 86.2%</span>
        </div>
        <div class="top-card first">
            <div class="rank-medal gold">1</div>
            <div class="avatar champion"><i class="fa-solid fa-crown"></i></div>
            <h3>MarketWolf</h3>
            <p>收益 $128,430</p>
            <span class="green">勝率 92.8%</span>
        </div>
        <div class="top-card third">
            <div class="rank-medal">3</div>
            <div class="avatar"><i class="fa-solid fa-user"></i></div>
            <h3>FutureAce</h3>
            <p>收益 $76,540</p>
            <span class="green">勝率 81.5%</span>
        </div>
    </div>
    <div class="ranking-table-card">
        <div class="table-header">
            <h3>完整排名</h3>
            <div class="table-search">
                <input type="text" placeholder="搜尋使用者..." id="rankingSearch">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
        <div class="ranking-table" id="rankingTable">
            <div class="ranking-row table-title">
                <span>排名</span>
                <span>使用者</span>
                <span>主要市場</span>
                <span>收益</span>
                <span>勝率</span>
                <span>交易量</span>
                <span>狀態</span>
            </div>
        </div>
    </div>
</section>
