<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UcMarket Admin 登入</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  
  <link href="css/admin.css" rel="stylesheet">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 12px;
      padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
    }
    .login-card h2 { font-weight: 700; }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="text-center mb-4">
        <i class="bi bi-grid-1x2-fill fs-1 text-primary"></i>
        <h2 class="mt-2">UcMarket Admin</h2>
        <p class="text-secondary">請使用管理員帳號登入</p>
      </div>
      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login-email" class="form-label">Email</label>
          <input type="email" class="form-control" id="login-email" required placeholder="admin.shung@ucmarket.test">
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">密碼</label>
          <input type="password" class="form-control" id="login-password" required placeholder="password">
        </div>
        <div id="login-error" class="alert alert-danger d-none py-2"></div>
        <button type="submit" class="btn btn-primary w-100" id="login-btn">
          <span id="login-spinner" class="spinner-border spinner-border-sm me-1 d-none"></span>
          登入
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      var form = document.getElementById('login-form');
      var email = document.getElementById('login-email');
      var password = document.getElementById('login-password');
      var errorDiv = document.getElementById('login-error');
      var btn = document.getElementById('login-btn');
      var spinner = document.getElementById('login-spinner');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        errorDiv.classList.add('d-none');
        btn.disabled = true;
        spinner.classList.remove('d-none');

        window.doLogin(email.value, password.value)
          .then(function (data) {
            console.log('[login] success, got accessToken:', !!data.accessToken);
            api.setToken(data.accessToken);
            console.log('[login] redirecting to index.html');
            window.location.href = 'index.html';
          })
          .catch(function (err) {
            console.log('[login] FAILED:', err);
            errorDiv.textContent = '登入失敗：帳號或密碼錯誤';
            errorDiv.classList.remove('d-none');
          })
          .finally(function () {
            btn.disabled = false;
            spinner.classList.add('d-none');
          });
      });
    })();
  </script>
</body>
</html>
