<div class="page-header mb-3">
  <h1 class="h3 mb-1">建立事件</h1>
  <p class="text-secondary mb-0">建立新的預測事件，儲存草稿後可再送審核准。</p>
</div>

<div class="alert alert-info d-flex align-items-center gap-2 mb-3 py-2">
  <i class="bi bi-info-circle"></i>
  <span>流程：填寫資料 → 儲存草稿（DRAFT） → 送審（PENDING） → 核准上架（ACTIVE）</span>
</div>

<div class="block-card shadow-sm">
  <div class="block-card-header">事件基本資訊</div>
  <div class="block-card-body">
    <form id="create-market-form" novalidate>
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">標題 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="cm-title" required placeholder="例如：比特幣會在 2026 年底前突破 20 萬美元嗎？">
          <div class="invalid-feedback">請輸入事件標題</div>
        </div>

        <div class="col-12">
          <label class="form-label">描述</label>
          <textarea class="form-control" id="cm-description" rows="3" placeholder="請詳細描述事件的背景、範圍與判斷方式..."></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">分類 <span class="text-danger">*</span></label>
          <select class="form-select" id="cm-category" required>
            <option value="">請選擇分類</option>
            <option>加密貨幣</option>
            <option>股票</option>
            <option>科技</option>
            <option>政治</option>
            <option>體育</option>
            <option>總經</option>
            <option>娛樂</option>
            <option>其他</option>
          </select>
          <div class="invalid-feedback">請選擇分類</div>
        </div>

        <div class="col-md-6">
          <label class="form-label">事件類型</label>
          <div class="d-flex gap-3 pt-1">
            <div class="form-check">
              <input class="form-check-input" type="radio" name="marketType" id="type-binary" value="BINARY" checked>
              <label class="form-check-label" for="type-binary">二元（YES/NO）</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="marketType" id="type-range" value="COUNT_RANGE">
              <label class="form-check-label" for="type-range">區間</label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="marketType" id="type-multi" value="MULTIPLE_CHOICE">
              <label class="form-check-label" for="type-multi">多選</label>
            </div>
          </div>
        </div>

        <div class="col-12">
          <label class="form-label">來源網址</label>
          <input type="url" class="form-control" id="cm-sourceUrl" placeholder="https://example.com/news/article">
        </div>

        <div class="col-md-8">
          <label class="form-label">裁決規則 <span class="text-danger">*</span></label>
          <textarea class="form-control" id="cm-resolutionRule" rows="2" required placeholder="說明事件結果的裁決依據與資料來源..."></textarea>
          <div class="invalid-feedback">請輸入裁決規則</div>
        </div>

        <div class="col-md-4">
          <label class="form-label">截止時間 <span class="text-danger">*</span></label>
          <input type="datetime-local" class="form-control" id="cm-closeAt" required>
          <div class="invalid-feedback">請選擇截止時間</div>
        </div>
      </div>
    </form>
  </div>
  <div class="p-3 border-top d-flex gap-2 justify-content-end">
    <button type="button" class="btn btn-outline-secondary" id="cm-save-draft">
      <i class="bi bi-file-earmark"></i> 儲存草稿
    </button>
    <button type="button" class="btn btn-primary" id="cm-submit">
      <i class="bi bi-send"></i> 建立並送審
    </button>
  </div>
</div>
