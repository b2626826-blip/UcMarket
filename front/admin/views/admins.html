<div class="page-header mb-3">
  <h1 class="h3 mb-1">管理員清單</h1>
  <p class="text-secondary mb-0">檢視與管理所有平台管理員帳號。</p>
</div>

<section class="admin-kpi-row mb-3" id="admins-summary">
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">總管理員</div>
    <div class="h4 mb-0 text-primary" id="a-sum-0">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">線上中</div>
    <div class="h4 mb-0 text-success" id="a-sum-1">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">停權中</div>
    <div class="h4 mb-0 text-danger" id="a-sum-2">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">今日操作次數</div>
    <div class="h4 mb-0 text-warning" id="a-sum-3">-</div>
  </article>
</section>

<form id="admins-filter" class="admin-filter-bar mb-3">
  <div>
    <label class="form-label small text-secondary mb-1">關鍵字</label>
    <input class="form-control" type="search" data-filter-key="keyword" placeholder="搜尋帳號、使用者名稱">
  </div>
  <div>
    <label class="form-label small text-secondary mb-1">帳戶狀態</label>
    <select class="form-select" data-filter-key="status">
      <option value="">全部狀態</option>
      <option value="ACTIVE">正常</option>
      <option value="BANNED">停權</option>
    </select>
  </div>
  <div>
    <button type="submit" class="btn btn-primary">搜尋</button>
    <button type="button" class="btn btn-outline-secondary" id="admins-filter-reset">清除篩選</button>
  </div>
</form>

<section class="block-card shadow-sm">
  <div class="block-card-header" id="admins-table-title">管理員資料</div>
  <div class="block-card-body p-0">
    <div class="table-responsive">
      <table class="table align-middle mb-0 admin-data-table">
        <thead class="table-light">
          <tr>
            <th class="ps-3">帳號編號</th>
            <th>使用者</th>
            <th>Email</th>
            <th>角色</th>
            <th>狀態</th>
            <th>最後登入</th>
            <th>建立時間</th>
            <th class="text-center">操作</th>
          </tr>
        </thead>
        <tbody id="admins-list"></tbody>
      </table>
    </div>
  </div>
</section>
