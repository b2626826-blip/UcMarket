<div class="page-header mb-3">
  <h1 class="h3 mb-1">事件列表</h1>
  <p class="text-secondary mb-0">集中管理市場狀態、截止時間與交易量。</p>
</div>

<section class="admin-kpi-row mb-3" id="markets-summary">
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">全部事件</div>
    <div class="h4 mb-0 text-primary" id="m-sum-0">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">待審核</div>
    <div class="h4 mb-0 text-warning" id="m-sum-1">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">進行中</div>
    <div class="h4 mb-0 text-success" id="m-sum-2">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">已結算</div>
    <div class="h4 mb-0 text-secondary" id="m-sum-3">-</div>
  </article>
</section>

<form id="markets-filter" class="admin-filter-bar mb-3">
  <div>
    <label class="form-label small text-secondary mb-1">關鍵字</label>
    <input class="form-control" type="search" data-filter-key="keyword" placeholder="搜尋事件編號、標題、建立者">
  </div>
  <div>
    <label class="form-label small text-secondary mb-1">狀態</label>
    <select class="form-select" data-filter-key="status">
      <option value="">全部狀態</option>
      <option value="PENDING">待審核</option>
      <option value="ACTIVE">進行中</option>
      <option value="CLOSED">已截止</option>
      <option value="RESOLVED">已結算</option>
    </select>
  </div>
  <div>
    <label class="form-label small text-secondary mb-1">分類</label>
    <select class="form-select" data-filter-key="category">
      <option value="">全部分類</option>
    </select>
  </div>
  <div>
    <button type="submit" class="btn btn-primary">搜尋</button>
    <button type="button" class="btn btn-outline-secondary" id="markets-filter-reset">清除篩選</button>
  </div>
</form>

<section class="block-card shadow-sm">
  <div class="block-card-header" id="markets-table-title">事件資料</div>
  <div class="block-card-body p-0">
    <div class="table-responsive">
      <table class="table align-middle mb-0 admin-data-table">
        <thead class="table-light">
          <tr>
            <th class="ps-3">事件編號</th>
            <th>標題</th>
            <th>分類</th>
            <th>建立者</th>
            <th>截止日</th>
            <th>YES 池</th>
            <th>NO 池</th>
            <th>狀態</th>
            <th class="text-center">操作</th>
          </tr>
        </thead>
        <tbody id="markets-list"></tbody>
      </table>
    </div>
  </div>
</section>
