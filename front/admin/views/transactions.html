<div class="page-header mb-3">
  <h1 class="h3 mb-1">交易紀錄</h1>
  <p class="text-secondary mb-0">檢視即時成交、異常交易標記與退款紀錄。</p>
</div>

<section class="admin-kpi-row mb-3" id="tx-summary">
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">今日成交筆數</div>
    <div class="h4 mb-0 text-primary" id="t-sum-0">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">今日成交量</div>
    <div class="h4 mb-0 text-success" id="t-sum-1">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">異常交易</div>
    <div class="h4 mb-0 text-danger" id="t-sum-2">-</div>
  </article>
  <article class="admin-kpi-card shadow-sm">
    <div class="small text-secondary mb-2">退款筆數</div>
    <div class="h4 mb-0 text-warning" id="t-sum-3">-</div>
  </article>
</section>

<form id="tx-filter" class="admin-filter-bar mb-3">
  <div>
    <label class="form-label small text-secondary mb-1">關鍵字</label>
    <input class="form-control" type="search" data-filter-key="keyword" placeholder="搜尋交易編號、帳號、事件編號">
  </div>
  <div>
    <label class="form-label small text-secondary mb-1">類型</label>
    <select class="form-select" data-filter-key="action">
      <option value="">全部類型</option>
      <option value="BUY">買入</option>
      <option value="SELL">賣出</option>
    </select>
  </div>
  <div>
    <label class="form-label small text-secondary mb-1">方向</label>
    <select class="form-select" data-filter-key="side">
      <option value="">全部方向</option>
      <option value="YES">YES</option>
      <option value="NO">NO</option>
    </select>
  </div>
  <div>
    <button type="submit" class="btn btn-primary">搜尋</button>
    <button type="button" class="btn btn-outline-secondary" id="tx-filter-reset">清除篩選</button>
  </div>
</form>

<section class="block-card shadow-sm">
  <div class="block-card-header" id="tx-table-title">交易資料</div>
  <div class="block-card-body p-0">
    <div class="table-responsive">
      <table class="table align-middle mb-0 admin-data-table">
        <thead class="table-light">
          <tr>
            <th class="ps-3">交易編號</th>
            <th>用戶 ID</th>
            <th>事件編號</th>
            <th>類型</th>
            <th>方向</th>
            <th>金額</th>
            <th>成交價</th>
            <th>股數</th>
            <th>成交時間</th>
          </tr>
        </thead>
        <tbody id="transactions-list"></tbody>
      </table>
    </div>
  </div>
</section>
