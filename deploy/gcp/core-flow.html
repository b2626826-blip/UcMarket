<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:600px; overflow:hidden; }
  body {
    background:#262626; color:#e6e6e6;
    font-family:"PingFang TC","Heiti TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    padding:34px 44px 40px; display:flex; flex-direction:column;
  }
  h1 { color:#e8b93f; font-size:34px; font-weight:700; text-align:center; margin-bottom:6px; }
  .sub { text-align:center; font-size:16px; color:#b99a4e; margin-bottom:30px; }

  .flow { display:flex; align-items:stretch; gap:0; flex:1; }
  .step {
    flex:1; background:#303030; border:1.4px solid #c99a3c; border-radius:10px;
    padding:20px 16px; display:flex; flex-direction:column;
  }
  .head { display:flex; align-items:center; gap:11px; margin-bottom:12px; }
  .num {
    width:38px; height:38px; border-radius:50%; background:#e0ad4d; color:#262626;
    font-size:18px; font-weight:700; display:flex; align-items:center; justify-content:center; flex:0 0 auto;
  }
  .title { color:#e8b93f; font-size:20px; font-weight:700; line-height:1.2; }
  .desc { font-size:15px; line-height:1.65; color:#d2d2d2; }
  .desc .k { color:#f0d79a; }

  .arrow {
    flex:0 0 34px; display:flex; align-items:center; justify-content:center;
    color:#e0ad4d; font-size:30px; font-weight:700;
  }

  .gate { border-color:#e0ad4d; background:#2f2b22; }
  .gate .tag {
    margin-top:auto; align-self:flex-start; background:#3a3527; border:1px solid #8a6f2e;
    border-radius:20px; padding:4px 14px; font-size:13px; color:#f0d79a;
  }

  .foot {
    margin-top:24px; background:#2f2b22; border:1.6px solid #c99a3c; border-radius:10px;
    padding:14px 22px; display:flex; align-items:center; gap:14px; font-size:16px; color:#dcdcdc;
  }
  .foot b { color:#e8b93f; }
</style></head>
<body>
  <h1>核心流程</h1>
  <div class="sub">一個事件市場，從開盤到結算的完整生命週期</div>

  <div class="flow">
    <div class="step">
      <div class="head"><div class="num">01</div><div class="title">開盤</div></div>
      <div class="desc">使用者提出<span class="k">預測盤</span>，設定事件、<span class="k">Yes / No</span> 結果與到期時間</div>
    </div>

    <div class="arrow">→</div>

    <div class="step gate">
      <div class="head"><div class="num">02</div><div class="title">審核</div></div>
      <div class="desc">系統<span class="k">規則檢查</span> + <span class="k">管理員審核</span>，通過才上架</div>
      <div class="tag">風險控制關卡</div>
    </div>

    <div class="arrow">→</div>

    <div class="step">
      <div class="head"><div class="num">03</div><div class="title">交易</div></div>
      <div class="desc">使用者以<span class="k">虛擬點數</span>對 Yes / No 下單，建立持倉</div>
    </div>

    <div class="arrow">→</div>

    <div class="step">
      <div class="head"><div class="num">04</div><div class="title">價格變動</div></div>
      <div class="desc"><span class="k">AMM</span> 依買賣即時定價，價格反映群體對結果的信心</div>
    </div>

    <div class="arrow">→</div>

    <div class="step">
      <div class="head"><div class="num">05</div><div class="title">結算</div></div>
      <div class="desc">到期判定實際結果，依持倉<span class="k">分配點數</span>並更新錢包</div>
    </div>
  </div>

  <div class="foot">
    <b>全程虛擬點數</b>　不涉及真實金流與賭博，重點在預測市場產品流程與前後端分離架構的完整實作
  </div>
</body>
</html>
