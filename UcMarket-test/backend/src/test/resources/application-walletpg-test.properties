# walletpg-test profile -- PRIVATE profile for the wallet/trade concurrency/lock tests (real PostgreSQL).
# Intentionally NOT named "pgtest": "pgtest" is the team-shared convention used by the
# User/Market/... integration tests; reusing it would drag PostgreSQL into those too.
# Only the opt-in WalletConcurrencyTest / TradeConcurrencyTest
# (@ActiveProfiles("walletpg-test") + WALLET_PG_TEST=true) use it.
#
# Comments kept in ASCII/English so this .properties never shows mojibake
# (Eclipse opens .properties as ISO-8859-1 by default, which garbles UTF-8 Chinese).
#
# Credentials default to the documented dev values, but can be overridden per machine
# via the same SPRING_DATASOURCE_* env vars as the main application.properties.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ucmarket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:post}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never
