spring.datasource.url=jdbc:h2:mem:ucmarket;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.sql.init.mode=always

cors.allowed-origins=http://localhost:5173

app.jwt.secret=ucmarket-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000
