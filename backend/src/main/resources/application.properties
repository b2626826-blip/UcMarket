spring.application.name=UcMarket

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ucmarket}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:850910}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Apply versioned PostgreSQL schema changes from classpath:db/migration at startup.
# Set FLYWAY_BASELINE_ON_MIGRATE=true only for the first startup against an
# existing database that already matches V1__initial_schema.sql.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
spring.flyway.baseline-version=1

# JWT
app.jwt.secret=${APP_JWT_SECRET:ucmarket-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
app.jwt.access-token-expiration=86400000
app.jwt.refresh-token-expiration=604800000

# Set FIREBASE_SERVICE_ACCOUNT_PATH to enable Firebase Admin SDK.

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

server.port=8080

# CWA Open Data API Key (for auto-creating weather markets)
cwa.api.key=${CWA_API_KEY:}

# Weather mock data: when true, generate deterministic fake forecasts on startup
# instead of calling the real CWA API. Set WEATHER_MOCK_ENABLED=true for local development.
weather.mock.enabled=${WEATHER_MOCK_ENABLED:true}

# Automatic weather market resolution (CWA observation data)
weather.resolution.enabled=${WEATHER_RESOLUTION_ENABLED:true}
weather.resolution.cron=${WEATHER_RESOLUTION_CRON:0 0 * * * ?}

# Mock observation data for development: when true, weather markets resolve deterministically
# without calling CWA observation APIs. Temperature -> YES, Monthly rain -> NO.
weather.mock.observation.enabled=${WEATHER_MOCK_OBSERVATION_ENABLED:false}
