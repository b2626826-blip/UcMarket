<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UcMarket 登入註冊公版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar polymarket-topbar" aria-label="Primary">
        <a class="brand" href="./index.html" aria-label="UcMarket">
          <span class="brand-mark market-logo">U</span>
          <span>UcMarket</span>
        </a>
        <label class="global-search" aria-label="搜尋市場">
          <span aria-hidden="true">⌕</span>
          <input type="search" placeholder="搜尋 UcMarket 市場..." />
          <kbd>/</kbd>
        </label>
        <div class="top-actions">
          <a class="ghost-action" href="./auth.html?mode=login">登入</a>
          <a class="primary-action" href="./auth.html?mode=register">註冊</a>
          <a class="create-market-action" href="./create-market.html">新增市場</a>
          <button class="icon-button menu-button" type="button" aria-label="開啟選單">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <nav class="category-bar" aria-label="Market categories">
        <a href="./index.html#markets">政治</a>
        <a href="./index.html#markets">運動</a>
        <a href="./index.html#markets">天氣</a>
        <a href="./index.html#markets">時事</a>
        <a href="./index.html#markets">金融</a>
      </nav>

      <main class="page-main auth-page">
        <section class="page-hero narrow">
          <p class="eyebrow">Account</p>
          <h1>登入或建立帳號</h1>
          <p>讓組員先對會員入口、欄位與狀態有共同參照，正式版再串接 Auth API。</p>
        </section>

        <section class="auth-standalone">
          <div class="auth-card">
            <div class="auth-tabs" role="tablist" aria-label="登入註冊切換">
              <button class="auth-tab is-active" type="button" data-page-auth-tab="login">登入</button>
              <button class="auth-tab" type="button" data-page-auth-tab="register">註冊</button>
            </div>

            <form class="auth-form is-active" data-page-auth-panel="login">
              <label>
                <span>Email</span>
                <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
              </label>
              <label>
                <span>密碼</span>
                <input type="password" name="password" placeholder="輸入密碼" autocomplete="current-password" required />
              </label>
              <div class="form-row split">
                <label class="check-line">
                  <input type="checkbox" checked />
                  <span>保持登入</span>
                </label>
                <a href="#">忘記密碼</a>
              </div>
              <button class="auth-submit" type="submit">登入</button>
            </form>

            <form class="auth-form" data-page-auth-panel="register">
              <label>
                <span>使用者名稱</span>
                <input type="text" name="username" placeholder="你的顯示名稱" autocomplete="username" required />
              </label>
              <label>
                <span>Email</span>
                <input type="email" name="email" placeholder="you@example.com" autocomplete="email" required />
              </label>
              <label>
                <span>密碼</span>
                <input type="password" name="password" placeholder="至少 8 個字元" autocomplete="new-password" required />
              </label>
              <label class="check-line">
                <input type="checkbox" required />
                <span>我理解本平台使用虛擬點數，不涉及真實金流。</span>
              </label>
              <button class="auth-submit" type="submit">建立帳號</button>
            </form>

            <p class="auth-status" data-page-auth-status aria-live="polite"></p>
          </div>

          <aside class="page-card">
            <p class="eyebrow">Demo Notes</p>
            <h2>登入後預期狀態</h2>
            <ul class="feature-list">
              <li>Topbar 顯示使用者名稱與點數餘額。</li>
              <li>可以進入我的資產與交易紀錄。</li>
              <li>建立市場時可自動帶入開盤者資訊。</li>
              <li>管理員角色會看到審核入口。</li>
            </ul>
          </aside>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
