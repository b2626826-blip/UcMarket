<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UcMarket 建立市場公版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar polymarket-topbar" aria-label="Primary">
        <a class="brand" href="./index.html" aria-label="UcMarket">
          <span class="brand-mark market-logo">U</span>
          <span>UcMarket</span>
        </a>
        <label class="global-search" aria-label="搜尋市場">
          <span aria-hidden="true">⌕</span>
          <input type="search" placeholder="搜尋 UcMarket 市場..." />
          <kbd>/</kbd>
        </label>
        <div class="top-actions">
          <a class="ghost-action" href="./auth.html?mode=login">登入</a>
          <a class="primary-action" href="./auth.html?mode=register">註冊</a>
          <a class="create-market-action" href="./create-market.html">新增市場</a>
          <button class="icon-button menu-button" type="button" aria-label="開啟選單">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <nav class="category-bar" aria-label="Market categories">
        <a href="./index.html#markets">政治</a>
        <a href="./index.html#markets">運動</a>
        <a href="./index.html#markets">天氣</a>
        <a href="./index.html#markets">時事</a>
        <a href="./index.html#markets">金融</a>
      </nav>

      <main class="page-main">
        <section class="page-hero">
          <p class="eyebrow">Create Market</p>
          <h1>建立可審核、可結算的預測市場</h1>
          <p>這頁給開盤流程做參照：題目、分類、截止時間、資料來源與結算規則都要在送審前被檢查。</p>
        </section>

        <section class="form-workspace">
          <form class="page-card market-form" id="createMarketForm">
            <label>
              <span>市場標題</span>
              <input name="title" type="text" value="2026-06-30 前，BTC 是否會突破 120,000 美元？" required />
            </label>

            <div class="form-row">
              <label>
                <span>分類</span>
                <select name="category">
                  <option>政治</option>
                  <option selected>金融</option>
                  <option>運動</option>
                  <option>天氣</option>
                  <option>時事</option>
                </select>
              </label>
              <label>
                <span>市場類型</span>
                <select name="type">
                  <option selected>二元 Yes / No</option>
                  <option>次數型</option>
                  <option>多選項</option>
                </select>
              </label>
            </div>

            <label>
              <span>停止交易時間</span>
              <input name="closeAt" type="datetime-local" value="2026-06-30T23:59" required />
            </label>

            <label>
              <span>資料來源 URL</span>
              <input name="sourceUrl" type="url" value="https://www.coinbase.com/price/bitcoin" required />
            </label>

            <label>
              <span>結算規則</span>
              <textarea name="rule" rows="5" required>以 Coinbase 現貨價格為準，若在截止時間前 BTC 價格曾突破 120,000 美元，Yes 結算為勝出。</textarea>
            </label>

            <button class="auth-submit" type="submit">送出審核</button>
            <p class="auth-status" id="createMarketStatus" aria-live="polite"></p>
          </form>

          <aside class="page-card review-checklist">
            <p class="eyebrow">Rule Check</p>
            <h2>自動規則檢查</h2>
            <ul class="check-list">
              <li data-check="title" class="is-pass">題目長度足夠</li>
              <li data-check="source" class="is-pass">有明確資料來源</li>
              <li data-check="time" class="is-pass">有截止時間</li>
              <li data-check="rule" class="is-pass">結算規則可客觀判定</li>
              <li data-check="risk">未偵測到模糊詞</li>
            </ul>
            <div class="preview-box">
              <span>送審後狀態</span>
              <strong>PENDING</strong>
              <p>管理員可在後台審核通過、拒絕或要求修改。</p>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
