<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UcMarket 市場詳情公版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar polymarket-topbar" aria-label="Primary">
        <a class="brand" href="./index.html" aria-label="UcMarket">
          <span class="brand-mark market-logo">U</span>
          <span>UcMarket</span>
        </a>
        <label class="global-search" aria-label="搜尋市場">
          <span aria-hidden="true">⌕</span>
          <input type="search" placeholder="搜尋 UcMarket 市場..." />
          <kbd>/</kbd>
        </label>
        <div class="top-actions">
          <a class="ghost-action" href="./auth.html?mode=login">登入</a>
          <a class="primary-action" href="./auth.html?mode=register">註冊</a>
          <a class="create-market-action" href="./create-market.html">新增市場</a>
          <button class="icon-button menu-button" type="button" aria-label="開啟選單">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <nav class="category-bar" aria-label="Market categories">
        <a href="./index.html#markets">政治</a>
        <a class="is-active" href="./index.html#markets">運動</a>
        <a href="./index.html#markets">天氣</a>
        <a href="./index.html#markets">時事</a>
        <a href="./index.html#markets">金融</a>
      </nav>

      <main class="page-main detail-layout">
        <section class="page-card detail-main">
          <div class="market-meta">
            <span>運動</span>
            <span>ACTIVE</span>
            <span>截止 2026-12-31</span>
          </div>
          <h1>2026 年 NBA 冠軍會是哪一隊？</h1>
          <p class="detail-summary">此市場用來示範市場詳情頁：價格走勢、交易試算、結算規則、資料來源與近期交易紀錄。</p>

          <canvas id="heroChart" width="920" height="420" aria-label="Market price history"></canvas>

          <div class="detail-grid">
            <article>
              <span>Yes 價格</span>
              <strong>0.64</strong>
            </article>
            <article>
              <span>No 價格</span>
              <strong>0.36</strong>
            </article>
            <article>
              <span>成交量</span>
              <strong>406M</strong>
            </article>
          </div>

          <section class="page-card inset-card">
            <h2>結算規則</h2>
            <p>以 NBA 官方公告為準，若指定球隊在 2026 年總冠軍賽勝出，該選項結算為勝出。若賽季取消，市場由管理員取消並退款。</p>
            <a class="inline-page-link" href="#">資料來源：NBA Official</a>
          </section>
        </section>

        <aside class="page-card detail-trade">
          <p class="eyebrow">Trade</p>
          <h2>交易試算</h2>
          <div class="segmented-control" aria-label="Trade side">
            <button class="side-button is-active" type="button" data-detail-side="yes">Yes</button>
            <button class="side-button" type="button" data-detail-side="no">No</button>
          </div>
          <label class="amount-field">
            <span>投入點數</span>
            <input id="detailAmount" type="number" min="10" step="10" value="500" />
          </label>
          <div class="quote-card">
            <div>
              <span>成交價格</span>
              <strong id="detailPrice">0.64</strong>
            </div>
            <div>
              <span>預估份額</span>
              <strong id="detailShares">781.25</strong>
            </div>
            <div>
              <span>最高回收</span>
              <strong id="detailReturn">781</strong>
            </div>
          </div>
          <button class="submit-trade" type="button" id="detailTradeButton">送出交易</button>
          <p class="auth-status" id="detailTradeStatus" aria-live="polite"></p>
        </aside>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
