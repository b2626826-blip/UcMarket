<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UcMarket 排行榜公版</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar polymarket-topbar" aria-label="Primary">
        <a class="brand" href="./index.html" aria-label="UcMarket">
          <span class="brand-mark market-logo">U</span>
          <span>UcMarket</span>
        </a>
        <label class="global-search" aria-label="搜尋市場">
          <span aria-hidden="true">⌕</span>
          <input type="search" placeholder="搜尋 UcMarket 市場..." />
          <kbd>/</kbd>
        </label>
        <div class="top-actions">
          <a class="ghost-action" href="./auth.html?mode=login">登入</a>
          <a class="primary-action" href="./auth.html?mode=register">註冊</a>
          <a class="create-market-action" href="./create-market.html">新增市場</a>
          <button class="icon-button menu-button" type="button" aria-label="開啟選單">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </header>

      <main class="page-main ranking-main">
        <section class="page-hero">
          <p class="eyebrow">Ranking</p>
          <h1>排行榜</h1>
          <p>展示盈虧、勝率與資產排行，讓作品集更容易講出使用者成就感。</p>
        </section>

        <section class="page-card">
          <div class="filter-tabs ranking-tabs" role="tablist" aria-label="排行榜切換">
            <button class="tab-button is-active" type="button" data-ranking-tab="profit">盈虧榜</button>
            <button class="tab-button" type="button" data-ranking-tab="win-rate">勝率榜</button>
            <button class="tab-button" type="button" data-ranking-tab="assets">資產榜</button>
          </div>

          <ol class="leaderboard-list" id="leaderboardList">
            <li><span>1</span><strong>chen_qa</strong><em>+3,420 pts</em></li>
            <li><span>2</span><strong>market_tim</strong><em>+2,850 pts</em></li>
            <li><span>3</span><strong>eagle_admin</strong><em>+2,110 pts</em></li>
            <li><span>4</span><strong>roy_position</strong><em>+1,680 pts</em></li>
          </ol>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
