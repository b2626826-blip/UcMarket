<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 | UCMARKET</title>
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/ranking.css">
</head>
<body>
  <main class="ranking-page">
    <h1>排行榜</h1>
    <p>排行榜頁建立中</p>
    <div class = "ranking-tabs" aria-label = "排行榜類型">
      <section class="top-rank-grid" aria-label="前三名排行榜"></section>
      <section class="ranking-table-card">
          <div class="ranking-table" aria-label="完整排行榜"></div>
      </section>
      
      <button class = "active" data-ranking-type = "profit">盈虧榜</button>
      <button data-ranking-type = "win-rate">勝率榜</button>
      <button data-ranking-type = "assets">資產榜</button>
    </div>
  </main>

  <script src="./main.js"></script>
</body>
</html>
