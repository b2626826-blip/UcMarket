<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>排行榜 | UCMARKET</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <main class="ranking-page">
    <section class="ranking-hero">
      <div>
        <p class="ranking-badge">交易排行榜</p>
        <h1>排行榜頁</h1>
        <p class="ranking-description">
          這裡會顯示收益、勝率與資產排行榜。
        </p>
      </div>

      <section class="my-ranking-card" aria-label="我的排名"></section>
    </section>

    <div class="ranking-tabs" aria-label="排行榜類型">
      <button class="active" type="button" data-ranking-type="profit">盈虧榜</button>
      <button type="button" data-ranking-type="win-rate">勝率榜</button>
      <button type="button" data-ranking-type="assets">資產榜</button>
    </div>

    <div class="ranking-toolbar">
      <input id="rankingSearch" type="search" placeholder="搜尋使用者、帳號或市場..." aria-label="搜尋排行榜">
    </div>

    <section class="top-rank-grid" aria-label="前三名排行榜"></section>

    <section class="ranking-table-card" aria-label="完整排行榜">
      <div class="ranking-table"></div>
    </section>
  </main>
  <script src="../../../api/rankingApi.js"></script>
  <script src="./main.js"></script>

</body>

</html>
