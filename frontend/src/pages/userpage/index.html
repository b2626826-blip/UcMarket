<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UcMarket 前台入口</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <h1 class="h3 mb-3">UcMarket 前台頁面</h1>
      <p class="text-secondary mb-4">這是前台入口占位頁，用來接住未通過後台權限守衛的使用者。</p>
      <div class="card shadow-sm border-0">
        <div class="card-body">
          <h2 class="h5">開發用身份切換</h2>
          <p class="text-secondary">目前使用 Session/Cookie 模型，開發階段先用本地模擬登入資訊。</p>
          <div class="d-flex gap-2 flex-wrap">
            <button id="setUser" class="btn btn-outline-primary">登入一般使用者</button>
            <button id="setAdmin" class="btn btn-primary">登入管理員</button>
            <button id="clearUser" class="btn btn-outline-danger">登出</button>
            <a class="btn btn-dark" href="../adminpage/index.html#/admin/dashboard">前往後台</a>
          </div>
        </div>
      </div>
    </main>

    <script>
      const key = "ucmarket-dev-session";

      document.querySelector("#setUser").addEventListener("click", () => {
        sessionStorage.setItem(key, JSON.stringify({ username: "user_demo", role: "user" }));
        alert("已設定為一般使用者");
      });

      document.querySelector("#setAdmin").addEventListener("click", () => {
        sessionStorage.setItem(key, JSON.stringify({ username: "admin", role: "admin" }));
        alert("已設定為管理員");
      });

      document.querySelector("#clearUser").addEventListener("click", () => {
        sessionStorage.removeItem(key);
        alert("已登出");
      });
    </script>
  </body>
</html>
