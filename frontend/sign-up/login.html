<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 | UCMarket Taiwan</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<header class="navbar">

    <div class="logo">
        <div class="logo-icon">
            <i class="fa-solid fa-chart-simple"></i>
        </div>
        <span>UCMARKET</span>
    </div>

    <nav class="nav-menu">
        <a href="#">錢包</a>
        <a href="#">交易</a>
        <a href="#">持倉</a>
        <a href="#">市場</a>
        <a href="#">排行榜</a>
        <a href="#">結算</a>
    </nav>

    <div class="nav-right">
        <a href="#">繁體</a>
        <a href="#">遊戲玩法</a>
        <a href="#" class="active">登入</a>

        <button class="register-btn">註冊</button>

        <button class="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

</header>

<main class="login-wrapper "login-bg-container">

    <section class="login-bg-text ">
       <div class="bg-row row1">
     
        •U C M A R K E T •L O G I N •S Y S T E M
    </div>
     <div class="bg-row row3">
     
        •U C M A R K E T •L O G I N •S Y S T E M
    </div>
     <div class="bg-row row2">
     
        •U C M A R K E T •L O G I N •S Y S T E M
    </div>
 
    </section>

    <section class="login-card">

        <div class="login-glow"></div>

        <div class="login-header">
            <span class="badge">
                <i class="fa-solid fa-right-to-bracket"></i>
                會員登入
            </span>

            <h1>歡迎回來</h1>

            <p>
                登入您的預測市場帳戶，查看持倉、交易紀錄與錢包資產。
            </p>
        </div>

        <form class="login-form" id="loginForm">

            <div class="form-group">
                <label>Email</label>

                <div class="input-box">
                    <input type="email" id="email" placeholder="example@gmail.com">
                    <i class="fa-regular fa-envelope"></i>
                </div>

                <small class="error-text"></small>
            </div>

            <div class="form-group">
                <div class="label-row">
                    <label>密碼</label>
                    <a href="#">忘記密碼？</a>
                </div>

                <div class="input-box">
                    <input type="password" id="password" placeholder="請輸入密碼">

                    <button type="button" id="togglePassword">
                        <i class="fa-regular fa-eye"></i>
                    </button>
                </div>

                <small class="error-text"></small>
            </div>

            <label class="remember-row">
                <input type="checkbox" id="remember">
                <span>記住我的登入狀態</span>
            </label>

            <button type="submit" class="login-submit-btn" id="loginSubmitBtn">
                登入帳戶
            </button>

        </form>

        <div class="login-divider">
            <span></span>
            <p>或使用以下方式</p>
            <span></span>
        </div>

        <div class="social-login">

            <button>
                <i class="fa-brands fa-google"></i>
            </button>

            <button>
                <i class="fa-solid fa-wallet"></i>
            </button>

            <button>
                <i class="fa-brands fa-github"></i>
            </button>

        </div>

        <p class="register-link">
            還沒有帳號？
            <a href="#">立即註冊</a>
        </p>

        <div class="security-list">

            <div>
                <i class="fa-solid fa-shield-halved"></i>
                <span>SSL 安全連線</span>
            </div>

            <div>
                <i class="fa-solid fa-lock"></i>
                <span>資料加密保護</span>
            </div>

        </div>

    </section>

</main>



<div class="login-toast" id="loginToast">
    <i class="fa-solid fa-check"></i>
    登入成功
</div>

<script src="./js/login.js"></script>

</body>
</html>
